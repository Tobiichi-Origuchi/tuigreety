name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [ master ]
  push:
    branches: [ "dev/**" ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-07-10
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Install test tools
        run: sudo apt-get update && sudo apt-get install --yes libnss-wrapper scdoc
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Lint
        run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - name: Test
        env:
          NSS_WRAPPER_PASSWD: contrib/fixtures/passwd
          NSS_WRAPPER_GROUP: contrib/fixtures/group
          LD_PRELOAD: libnss_wrapper.so
        run: cargo test --locked --all-features
      - name: Check man page
        run: scdoc < contrib/man/tuigreet-1.scd > /dev/null
      - name: Build release binary
        run: cargo build --locked --release
