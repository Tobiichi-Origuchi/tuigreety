name: Publish AUR release packages

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
    secrets:
      AUR_SSH_PRIVATE_KEY:
        required: true
  workflow_dispatch:
    inputs:
      version:
        description: Release version to publish
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: aur-publish
  cancel-in-progress: false

jobs:
  validate:
    needs: metadata
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    permissions: {}
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - name: Install build tools
        run: pacman -Syu --noconfirm git rust scdoc greetd
      - name: Download publish metadata
        uses: actions/download-artifact@v8.0.1
        with:
          name: aur-release-publish-metadata
          path: ${{ runner.temp }}/aur-packages
      - name: Validate package builds
        run: |
          test "$(printf '%s' "$VERSION" | grep -Ec '^[0-9]+\.[0-9]+\.[0-9]+$')" -eq 1
          useradd --create-home builder
          artifact="$RUNNER_TEMP/aur-packages"
          test "$(find "$artifact" -mindepth 1 -maxdepth 1 -type d | wc -l)" -eq 2
          test -z "$(find "$artifact" -mindepth 1 -maxdepth 1 ! -type d -print -quit)"
          as_builder() {
            runuser -u builder -- env -i HOME=/home/builder USER=builder LOGNAME=builder PATH=/usr/local/sbin:/usr/local/bin:/usr/bin "$@"
          }
          for package in greetd-tuigreety greetd-tuigreety-bin; do
            directory="$RUNNER_TEMP/aur-packages/$package"
            test "$(find "$directory" -mindepth 1 -maxdepth 1 -type f | wc -l)" -eq 3
            test -z "$(find "$directory" -mindepth 1 -maxdepth 1 ! -type f -print -quit)"
            for file in PKGBUILD .SRCINFO tuigreet.conf; do
              test -f "$directory/$file"
              test ! -L "$directory/$file"
              test -s "$directory/$file"
            done
            chown -R builder:builder "$directory"
            as_builder sh -c "cd '$directory' && makepkg --cleanbuild --noconfirm"
            pkill -KILL -u builder || true
            chown -R root:root "$directory"
          done
      - name: Stop build processes
        if: always()
        run: pkill -KILL -u builder || true

  metadata:
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - name: Install metadata tools
        run: pacman -Syu --noconfirm git pacman-contrib
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - name: Generate publish metadata
        run: |
          test "$(printf '%s' "$VERSION" | grep -Ec '^[0-9]+\.[0-9]+\.[0-9]+$')" -eq 1
          useradd --create-home builder
          as_builder() {
            runuser -u builder -- env -i HOME=/home/builder USER=builder LOGNAME=builder PATH=/usr/local/sbin:/usr/local/bin:/usr/bin "$@"
          }
          for package in greetd-tuigreety greetd-tuigreety-bin; do
            directory="packaging/aur/$package"
            cp packaging/aur/tuigreet.conf "$directory/tuigreet.conf"
            sed -i "s/^pkgver=.*/pkgver=$VERSION/" "$directory/PKGBUILD"
            chown -R builder:builder "$directory"
            as_builder sh -c "cd '$directory' && updpkgsums"
            as_builder sh -c "cd '$directory' && makepkg --printsrcinfo > .SRCINFO"
            pkill -KILL -u builder || true
          done
      - name: Stop metadata processes
        if: always()
        run: pkill -KILL -u builder || true
      - name: Stage publish metadata
        run: |
          for package in greetd-tuigreety greetd-tuigreety-bin; do
            directory="packaging/aur/$package"
            artifact="$RUNNER_TEMP/aur-packages/$package"
            install -d -m755 "$artifact"
            install -m644 "$directory/PKGBUILD" "$artifact/PKGBUILD"
            install -m644 "$directory/.SRCINFO" "$artifact/.SRCINFO"
            install -m644 "$directory/tuigreet.conf" "$artifact/tuigreet.conf"
          done
      - name: Upload publish metadata
        uses: actions/upload-artifact@v7.0.1
        with:
          name: aur-release-publish-metadata
          path: ${{ runner.temp }}/aur-packages
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: [ validate, metadata ]
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    permissions: {}
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - name: Install publish tools
        run: pacman -Syu --noconfirm git openssh
      - name: Download verified metadata
        uses: actions/download-artifact@v8.0.1
        with:
          name: aur-release-publish-metadata
          path: ${{ runner.temp }}/aur-packages
      - name: Validate publish input
        run: |
          test "$(printf '%s' "$VERSION" | grep -Ec '^[0-9]+\.[0-9]+\.[0-9]+$')" -eq 1
          artifact="$RUNNER_TEMP/aur-packages"
          test "$(find "$artifact" -mindepth 1 -maxdepth 1 -type d | wc -l)" -eq 2
          test -z "$(find "$artifact" -mindepth 1 -maxdepth 1 ! -type d -print -quit)"
          for package in greetd-tuigreety greetd-tuigreety-bin; do
            directory="$artifact/$package"
            test -d "$directory"
            test "$(find "$directory" -mindepth 1 -maxdepth 1 -type f | wc -l)" -eq 3
            test -z "$(find "$directory" -mindepth 1 -maxdepth 1 ! -type f -print -quit)"
            for file in PKGBUILD .SRCINFO tuigreet.conf; do
              test -f "$directory/$file"
              test ! -L "$directory/$file"
              test -s "$directory/$file"
              test "$(stat --format=%s "$directory/$file")" -le 1048576
            done
          done
      - name: Prepare AUR connection
        run: |
          useradd --create-home publisher
          install -d -m700 -o publisher -g publisher /home/publisher/.ssh
          cat > /home/publisher/.ssh/config <<'EOF'
          Host aur.archlinux.org
            User aur
            IdentityFile ~/.ssh/aur
            IdentitiesOnly yes
          EOF
          ssh-keyscan -t ed25519 aur.archlinux.org > /home/publisher/.ssh/known_hosts
          test "$(ssh-keygen -lf /home/publisher/.ssh/known_hosts -E sha256 | awk '{print $2}')" = 'SHA256:RFzBCUItH9LZS0cKB5UE6ceAYhBD5C8GeOBip8Z11+4'
          chown publisher:publisher /home/publisher/.ssh/config /home/publisher/.ssh/known_hosts
          chmod 600 /home/publisher/.ssh/config /home/publisher/.ssh/known_hosts
          runuser -u publisher -- git config --global user.name 'Tobiichi Origuchi'
          runuser -u publisher -- git config --global user.email 'Tobiichi-Origuchi@users.noreply.github.com'
      - name: Publish packages
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          test -n "$AUR_SSH_PRIVATE_KEY"
          install -m600 -o publisher -g publisher /dev/null /home/publisher/.ssh/aur
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > /home/publisher/.ssh/aur
          unset AUR_SSH_PRIVATE_KEY
          trap 'rm -f /home/publisher/.ssh/aur' EXIT
          trap 'exit 129' HUP
          trap 'exit 130' INT
          trap 'exit 143' TERM

          for package in greetd-tuigreety greetd-tuigreety-bin; do
            directory="$RUNNER_TEMP/aur-packages/$package"
            repository="/home/publisher/$package"
            runuser -u publisher -- git -c init.defaultBranch=master -c core.hooksPath=/dev/null clone "ssh://aur@aur.archlinux.org/$package.git" "$repository"
            for file in PKGBUILD .SRCINFO tuigreet.conf; do
              test ! -L "$repository/$file"
            done
            install -m644 -o publisher -g publisher "$directory/PKGBUILD" "$repository/PKGBUILD"
            install -m644 -o publisher -g publisher "$directory/.SRCINFO" "$repository/.SRCINFO"
            install -m644 -o publisher -g publisher "$directory/tuigreet.conf" "$repository/tuigreet.conf"
            runuser -u publisher -- sh -c "cd '$repository' && git -c core.hooksPath=/dev/null add PKGBUILD .SRCINFO tuigreet.conf"
            if ! runuser -u publisher -- sh -c "cd '$repository' && git -c core.hooksPath=/dev/null diff --cached --quiet"; then
              runuser -u publisher -- sh -c "cd '$repository' && git -c core.hooksPath=/dev/null commit -m 'Update to $VERSION' && git -c core.hooksPath=/dev/null push origin master"
            fi
          done
