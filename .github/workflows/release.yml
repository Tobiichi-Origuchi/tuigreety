name: Release

on:
  push:
    branches: [ master ]
    tags: [ "[0-9]+.[0-9]+.[0-9]+" ]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: 1.88.0
  TAPLO_VERSION: 0.10.0

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy
      - name: Install rustfmt
        run: rustup toolchain install "$(cat RUSTFMT_VERSION)" --profile minimal --component rustfmt
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install Taplo
        uses: taiki-e/install-action@ed67fa35ac944f3a9b33f12c4dd43b6f31a47e20 # v2.83.3
        with:
          tool: taplo-cli@${{ env.TAPLO_VERSION }}
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install --yes scdoc
      - name: Check toolchain policy
        run: |
          test "$(rustc --version | cut -d ' ' -f 2)" = "$RUST_VERSION"
          msrv=$(cargo metadata --locked --no-deps --format-version 1 | jq --raw-output '.packages[0].rust_version')
          test "$msrv" = "${RUST_VERSION%.*}"
      - name: Check formatting
        run: cargo "+$(cat RUSTFMT_VERSION)" fmt --all --check
      - name: Check TOML formatting
        run: taplo fmt --check Cargo.toml .taplo.toml Cross.toml rust-toolchain.toml
      - name: Lint
        run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --locked --all-features
      - name: Check release version
        if: github.ref_type == 'tag'
        run: >-
          bash .github/scripts/validate-release.sh "$GITHUB_REF_NAME" "$GITHUB_SHA"
          dist/release-metadata/release-notes.md
      - name: Build man page
        run: |
          mkdir -p dist/release-metadata
          scdoc < contrib/man/tuigreet-1.scd > dist/release-metadata/tuigreet.1
      - name: Upload man page
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-metadata
          path: dist/release-metadata/
          if-no-files-found: error
          retention-days: 1

  build:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x86_64
            target: x86_64-unknown-linux-gnu
            machine: Advanced Micro Devices X86-64
          - name: aarch64
            target: aarch64-unknown-linux-gnu
            machine: AArch64
          - name: i686
            target: i686-unknown-linux-gnu
            machine: Intel 80386
          - name: armv7
            target: armv7-unknown-linux-gnueabihf
            machine: ARM
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: release-${{ matrix.target }}
      - name: Install cross
        uses: taiki-e/install-action@ed67fa35ac944f3a9b33f12c4dd43b6f31a47e20 # v2.83.3
        with:
          tool: cross@0.2.5
      - name: Download man page
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-metadata
          path: dist/metadata
      - name: Build reproducibly
        run: |
          cross build --locked --release --target "${{ matrix.target }}" --target-dir target/repro-a
          cross build --locked --release --target "${{ matrix.target }}" --target-dir target/repro-b
          cmp \
            "target/repro-a/${{ matrix.target }}/release/tuigreet" \
            "target/repro-b/${{ matrix.target }}/release/tuigreet"
      - name: Smoke test target binary
        run: |
          binary="target/repro-a/${{ matrix.target }}/release/tuigreet"
          file "$binary"
          readelf --file-header "$binary" | grep --fixed-strings 'Machine:' | grep --fixed-strings '${{ matrix.machine }}'
          version=$(cross run --locked --release --target "${{ matrix.target }}" --target-dir target/repro-a -- -v | grep '^tuigreet ')
          test -n "$version"
          test "${version#tuigreet }" != "$version"
      - name: Package
        env:
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || 'tip' }}
        run: |
          source_date_epoch=$(git show --no-patch --format=%ct HEAD)
          bash .github/scripts/package-release.sh \
            "$VERSION" \
            "${{ matrix.name }}" \
            "target/repro-a/${{ matrix.target }}/release/tuigreet" \
            dist/metadata/tuigreet.1 \
            dist \
            "$source_date_epoch"
      - name: Upload package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package-${{ matrix.name }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Download packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: package-*
          path: dist/packages
          merge-multiple: true
      - name: Download release metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-metadata
          path: dist/metadata
      - name: Attest release archives
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: dist/packages/*.tar.gz
      - name: Publish versioned release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          bash .github/scripts/publish-release.sh version "$GITHUB_REPOSITORY"
          "$GITHUB_REF_NAME" "$GITHUB_SHA" dist/metadata/release-notes.md dist/packages
      - name: Publish tip release
        if: github.ref_type == 'branch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/publish-release.sh tip "$GITHUB_REPOSITORY" "$GITHUB_SHA" dist/packages

  aur:
    needs: publish
    if: github.ref_type == 'tag'
    uses: ./.github/workflows/aur.yml
    with:
      version: ${{ github.ref_name }}
    secrets:
      AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
