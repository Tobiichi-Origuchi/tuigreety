name: Release

on:
  push:
    branches: [ master ]
    tags: [ "[0-9]+.[0-9]+.[0-9]+" ]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-07-10
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install --yes libnss-wrapper scdoc
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Lint
        run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - name: Test
        env:
          NSS_WRAPPER_PASSWD: contrib/fixtures/passwd
          NSS_WRAPPER_GROUP: contrib/fixtures/group
          LD_PRELOAD: libnss_wrapper.so
        run: cargo test --locked --all-features
      - name: Check release version
        if: github.ref_type == 'tag'
        run: |
          version=$(cargo metadata --locked --no-deps --format-version 1 | jq --raw-output '.packages[0].version')
          test "$version" = "$GITHUB_REF_NAME"
      - name: Build man page
        run: scdoc < contrib/man/tuigreet-1.scd > tuigreet.1
      - name: Upload man page
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-metadata
          path: tuigreet.1
          if-no-files-found: error
          retention-days: 1

  build:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x86_64
            target: x86_64-unknown-linux-gnu
          - name: aarch64
            target: aarch64-unknown-linux-gnu
          - name: i686
            target: i686-unknown-linux-gnu
          - name: armv7
            target: armv7-unknown-linux-gnueabihf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-07-10
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: release-${{ matrix.target }}
      - name: Install cross
        uses: taiki-e/install-action@v2.83.2
        with:
          tool: cross@0.2.5
      - name: Download man page
        uses: actions/download-artifact@v8.0.1
        with:
          name: release-metadata
          path: dist/metadata
      - name: Build
        run: cross build --locked --release --target "${{ matrix.target }}"
      - name: Package
        env:
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || 'tip' }}
        run: |
          package="tuigreety-${VERSION}-${{ matrix.name }}"
          install -Dm755 "target/${{ matrix.target }}/release/tuigreet" "dist/${package}/bin/tuigreet"
          install -Dm644 contrib/tuigreet.toml "dist/${package}/etc/tuigreet/config.toml"
          install -Dm644 LICENSE "dist/${package}/share/licenses/tuigreet/LICENSE"
          install -Dm644 README.md "dist/${package}/share/doc/tuigreet/README.md"
          install -Dm644 dist/metadata/tuigreet.1 "dist/${package}/share/man/man1/tuigreet.1"
          source_date_epoch=$(git show --no-patch --format=%ct HEAD)
          tar --create --sort=name --owner=0 --group=0 --numeric-owner --mtime="@${source_date_epoch}" --directory dist "$package" | gzip --no-name > "dist/${package}.tar.gz"
          cd dist
          sha256sum "${package}.tar.gz" > "${package}.tar.gz.sha256"
      - name: Upload package
        uses: actions/upload-artifact@v7.0.1
        with:
          name: package-${{ matrix.name }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download package
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: package-*
          path: dist
          merge-multiple: true
      - name: Publish versioned release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --repo "$GITHUB_REPOSITORY" --verify-tag --generate-notes --title "$GITHUB_REF_NAME"
      - name: Publish tip release
        if: github.ref_type == 'branch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view tip --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh api --method PATCH "repos/${GITHUB_REPOSITORY}/git/refs/tags/tip" --field sha="$GITHUB_SHA" --field force=true
            gh release view tip --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' | while read -r asset; do
              gh release delete-asset tip "$asset" --repo "$GITHUB_REPOSITORY" --yes
            done
            gh release upload tip dist/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create tip dist/* --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --prerelease --title tip --notes "Continuous build from master."
          fi

  aur:
    needs: publish
    if: github.ref_type == 'tag'
    uses: ./.github/workflows/aur.yml
    with:
      version: ${{ github.ref_name }}
    secrets:
      AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
