# tuigreet configuration
#
# Every field is optional. Uncomment only the settings you want to change.
# The commented values below are defaults unless the comment says "example".
# Changes are reloaded automatically; CLI options still take priority.
# Validate this file with: tuigreet --check-config
# Install active configuration as root:root 0644. It can select commands run
# after authentication, so it must not be writable by the greeter or other users.

[general]
# Write debug logs. Changing this while running requires a restart.
# debug = false
# Private regular-file log destination used when debug is enabled. Symlinks and
# files with additional hard links are refused. Requires a restart.
# log-file = "/tmp/tuigreet.log"
# Maximum time to wait for each greetd response; valid range: 1..=3600 seconds.
# ipc-timeout = 120
# Discard standard output and error from the session launched after login.
# quiet = false
# Enable Num Lock before drawing the login prompt. A reload cannot change it.
# numlock = false
# Run without greetd for UI testing. Requires a restart.
# mock = false

[session]
# Command selected at startup instead of the first discovered session (example).
# command = "sway"
# Let anyone at the greeter replace the session with an arbitrary command using F2.
# This command runs as the next authenticated user. Keep this disabled unless all
# people with physical access are trusted.
# allow-command-editor = false
# Environment entries passed with command; each item must be KEY=VALUE.
# environment = ["XDG_CURRENT_DESKTOP=sway"]
# Directories containing Wayland .desktop session files. Empty uses XDG defaults.
# sessions = []
# Directories containing X11 .desktop session files. Empty uses XDG defaults.
# xsessions = []
# Command prepended to non-X11 sessions (example).
# wrapper = "dbus-run-session"
# Command prepended to X11 sessions; false disables the wrapper.
# xsession-wrapper = "startx /usr/bin/env"

[display]
# Maximum width of the centered login prompt, in terminal columns.
# width = 80
# Login prompt title. true uses the hostname-based default, false hides it,
# and a non-empty string supplies custom text.
# title = true
# Show /etc/issue above the prompt. Cannot be combined with greeting.
# issue = false
# Fixed text shown above the prompt (example). Cannot be combined with issue.
# greeting = "Welcome"
# Show the current date and time.
# time = false
# strftime format used when time is enabled (example).
# time-format = "%Y-%m-%d %H:%M"
# Screen refresh rate in frames per second; valid range: 1..=240.
# refresh-rate = 2
# Legacy semicolon-separated theme overlay (example); prefer the [theme] table.
# theme = "border=blue;text=white"

[theme]
# Ratatui color names are accepted. Use false to clear an inherited color.
# Unset components use the terminal's default colors.
# border = "blue"
# text = "white"
# time = "white"
# container = "black"
# title = "blue"
# greet = "white"
# prompt = "white"
# input = "white"
# action = "white"
# button = "white"

[remember]
# Pre-fill the username from the last successfully started session.
# username = false
# Restore the last successfully started session or manually entered command globally.
# session = false
# Restore the last successfully started session per username; also enables username.
# user-session = false

[users]
# Administrator-selected username used when no remembered user is available
# (example). This does not enable remembering or expose the user list.
# default = "alice"
# Show an F-key menu containing eligible local users.
# menu = false
# Complete eligible usernames with Tab.
# autocomplete = false
# Inclusive UID bounds. Omitted values come from /etc/login.defs when available.
# min-uid = 1000
# max-uid = 60000

[secret]
# Display one or more characters for each typed secret character.
# asterisks = false
# Non-empty character sequence used when asterisks is enabled.
# characters = "*"

[layout]
# Blank rows/columns reserved around the entire terminal UI.
# window-padding = 0
# Blank cells between the prompt border and its contents.
# container-padding = 1
# Blank rows between username and password prompts.
# prompt-padding = 1
# Greeting alignment: "left", "center", or "right".
# greet-align = "center"

[power]
# Commands available before authentication. Treat custom values as privileged.
# Each command is an exact argv array: program first, then one item per argument.
# Shell expansion, pipelines, and redirection are never performed.
# shutdown = ["shutdown", "-h", "now"]
# reboot = ["shutdown", "-r", "now"]
# Suspend command (example); automatically detected for systemd or elogind.
# suspend = ["systemctl", "suspend"]
# Hibernate command (example); automatically detected for systemd or elogind.
# hibernate = ["systemctl", "hibernate"]
# Set an action to false to disable and hide it, including its detected default.
# Legacy command strings remain accepted and are parsed into argv for compatibility.
# Detach power commands in a new session/process group via setsid(2).
# This is an internal system call and does not require a setsid executable.
# Power commands time out after 30 seconds and can be cancelled with Escape.
# setsid = true

[keybindings]
# F-key numbers; each must be unique and in 1..=12.
# command = 2
# sessions = 3
# power = 12
